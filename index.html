<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Redesign Studio - MaximoSEO</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://***.supabase.co/v1/script.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎨 HTML Redesign Studio</h1>
            <p class="subtitle">שיפור אוטומטי של עיצוב HTML עם גלריית תבניות</p>
        </header>

        <!-- Site Scanner Section -->
        <section class="scanner-section">
            <h2>🔍 סורק אתר</h2>
            <div class="scanner-input">
                <input type="url" id="siteUrl" placeholder="הכנס כתובת אתר לסריקה (למשל: https://example.com)">
                <button onclick="scanSite()">סרוק אתר</button>
            </div>
            <div id="scanResults" class="scan-results" style="display:none;">
                <div class="color-palette">
                    <h3>🎨 פלטת צבעים</h3>
                    <div id="colorSwatches"></div>
                </div>
                <div class="fonts-detected">
                    <h3>🔤 פונטים</h3>
                    <div id="fontsList"></div>
                </div>
                <div class="images-detected">
                    <h3>🖼️ תמונות</h3>
                    <div id="imagesList"></div>
                </div>
            </div>
        </section>

        <!-- Design Gallery -->
        <section class="gallery-section">
            <h2>🎨 גלריית עיצובים</h2>
            <div class="gallery-filters">
                <button class="filter-btn active" data-category="all">הכל</button>
                <button class="filter-btn" data-category="minimalist">מינימליסטי</button>
                <button class="filter-btn" data-category="colorful">צבעוני</button>
                <button class="filter-btn" data-category="business">עסקי</button>
                <button class="filter-btn" data-category="dark">כהה</button>
                <button class="filter-btn" data-category="organic">אורגני</button>
            </div>
            <div id="designGallery" class="design-gallery"></div>
        </section>

        <!-- Templates Queue -->
        <section class="queue-section">
            <h2>📋 תור עיצוב</h2>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">📄</div>
                    <div class="stat-value" id="total-templates">0</div>
                    <div class="stat-label">סה"כ תבניות</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">✨</div>
                    <div class="stat-value" id="redesigned">0</div>
                    <div class="stat-label">עוצבו מחדש</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">🔄</div>
                    <div class="stat-value" id="in-progress">0</div>
                    <div class="stat-label">בתהליך</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">✅</div>
                    <div class="stat-value" id="approved">0</div>
                    <div class="stat-label">אושרו</div>
                </div>
            </div>

            <div class="table-container">
                <table id="templates-table">
                    <thead>
                        <tr>
                            <th>שם התבנית</th>
                            <th>עיצוב נבחר</th>
                            <th>סטטוס</th>
                            <th>שיפור</th>
                            <th>פעולות</th>
                        </tr>
                    </thead>
                    <tbody id="templates-tbody">
                        <tr><td colspan="5">טוען נתונים...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>

        <!-- Actions -->
        <section class="actions-section">
            <h2>⚡ פעולות</h2>
            <div class="action-buttons">
                <button class="btn-primary" onclick="processQueue()">🎨 עבד תור עיצוב</button>
                <button class="btn-secondary" onclick="sendToN8N()">📤 שלח ל-n8n</button>
                <button class="btn-secondary" onclick="exportAll()">📦 ייצא הכל</button>
            </div>
        </section>
    </div>

    <!-- Preview Modal -->
    <div id="previewModal" class="modal" style="display:none;">
        <div class="modal-content">
            <span class="close" onclick="closePreview()">&times;</span>
            <h2 id="previewTitle">תצוגה מקדימה</h2>
            <div class="preview-container">
                <div class="preview-header">
                    <h3>לפני</h3>
                    <h3>אחרי</h3>
                </div>
                <div class="preview-body">
                    <iframe id="previewBefore" class="preview-frame"></iframe>
                    <iframe id="previewAfter" class="preview-frame"></iframe>
                </div>
            </div>
            <div class="preview-actions">
                <button onclick="approveDesign()">✅ אשר עיצוב</button>
                <button onclick="closePreview()">❌ ביטול</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Supabase Configuration
        const SUPABASE_URL = 'https://***.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNieXNibmFucG9oY2RnYnJlbWJyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4ODcxNDcsImV4cCI6MjA5MzQ2MzE0N30.bX6rQ0vY8YQ8Z8Z8Z8Z8Z8Z8Z8Z8Z8Z8Z8Z8Z8Z8Z8Z';
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Design Templates Data
        let designTemplates = [];
        let selectedDesign = null;

        // Load Design Templates from Supabase
        async function loadDesignTemplates() {
            try {
                const { data, error } = await supabaseClient
                    .from('design_templates')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;
                
                designTemplates = data || [];
                renderGallery(designTemplates);
                console.log(`✓ Loaded ${designTemplates.length} design templates`);
            } catch (error) {
                console.error('Error loading templates:', error);
                // Fallback to sample data
                loadSampleTemplates();
            }
        }

        // Fallback Sample Templates
        function loadSampleTemplates() {
            designTemplates = [
                {
                    id: 1,
                    name: 'Modern Minimalist',
                    category: 'minimalist',
                    colors: { primary: '#000000', secondary: '#ffffff', accent: '#3b82f6' },
                    fonts: { heading: 'Inter', body: 'Inter' },
                    preview_url: 'https://images.unsplash.com/photo-1618004912476-29818d81ae2e?w=400',
                    css_code: 'body { font-family: Inter, sans-serif; }'
                },
                {
                    id: 2,
                    name: 'Vibrant Gradient',
                    category: 'colorful',
                    colors: { primary: '#ec4899', secondary: '#8b5cf6', accent: '#06b6d4' },
                    fonts: { heading: 'Poppins', body: 'Open Sans' },
                    preview_url: 'https://images.unsplash.com/photo-1557683316-973673baf926?w=400',
                    css_code: 'body { background: linear-gradient(135deg, #ec4899, #8b5cf6); }'
                },
                {
                    id: 3,
                    name: 'Corporate Blue',
                    category: 'business',
                    colors: { primary: '#1e40af', secondary: '#3b82f6', accent: '#f59e0b' },
                    fonts: { heading: 'Montserrat', body: 'Roboto' },
                    preview_url: 'https://images.unsplash.com/photo-1497366216548-37526070297c?w=400',
                    css_code: 'body { font-family: Roboto, sans-serif; color: #1e40af; }'
                },
                {
                    id: 4,
                    name: 'Dark Mode Elegant',
                    category: 'dark',
                    colors: { primary: '#0f172a', secondary: '#1e293b', accent: '#8b5cf6' },
                    fonts: { heading: 'Playfair Display', body: 'Lato' },
                    preview_url: 'https://images.unsplash.com/photo-1519741497674-611481863552?w=400',
                    css_code: 'body { background: #0f172a; color: #f1f5f9; }'
                },
                {
                    id: 5,
                    name: 'Nature Green',
                    category: 'organic',
                    colors: { primary: '#16a34a', secondary: '#22c55e', accent: '#84cc16' },
                    fonts: { heading: 'Merriweather', body: 'Source Sans Pro' },
                    preview_url: 'https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=400',
                    css_code: 'body { font-family: Source Sans Pro, sans-serif; color: #16a34a; }'
                }
            ];
            renderGallery(designTemplates);
        }

        // Render Design Gallery
        function renderGallery(templates) {
            const gallery = document.getElementById('designGallery');
            gallery.innerHTML = templates.map(template => `
                <div class="design-card" data-category="${template.category}" onclick="selectDesign(${template.id})">
                    <img src="${template.preview_url}" alt="${template.name}" class="design-preview">
                    <div class="design-info">
                        <h3>${template.name}</h3>
                        <span class="design-category">${getCategoryName(template.category)}</span>
                        <div class="color-palette-mini">
                            <span class="color-swatch" style="background:${template.colors.primary}"></span>
                            <span class="color-swatch" style="background:${template.colors.secondary}"></span>
                            <span class="color-swatch" style="background:${template.colors.accent}"></span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Filter Gallery
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                
                const category = e.target.dataset.category;
                const filtered = category === 'all' 
                    ? designTemplates 
                    : designTemplates.filter(t => t.category === category);
                renderGallery(filtered);
            });
        });

        // Select Design
        function selectDesign(id) {
            selectedDesign = designTemplates.find(t => t.id === id);
            if (selectedDesign) {
                showPreview(selectedDesign);
            }
        }

        // Show Preview Modal
        function showPreview(template) {
            document.getElementById('previewTitle').textContent = template.name;
            
            const beforeFrame = document.getElementById('previewBefore');
            const afterFrame = document.getElementById('previewAfter');
            
            // Load sample HTML for before
            beforeFrame.srcdoc = `
                <!DOCTYPE html>
                <html>
                <head><style>body { font-family: Arial; padding: 20px; }</style></head>
                <body>
                    <h1>לפני העיצוב</h1>
                    <p>זהו עיצוב HTML בסיסי ללא עיצוב מותאם אישית.</p>
                    <button>כפתור רגיל</button>
                </body>
                </html>
            `;
            
            // Load styled HTML for after
            afterFrame.srcdoc = `
                <!DOCTYPE html>
                <html>
                <head>
                    <style>
                        body { 
                            font-family: ${template.fonts.body}, sans-serif; 
                            background: ${template.colors.primary};
                            color: ${template.colors.secondary};
                            padding: 20px;
                        }
                        h1 { color: ${template.colors.accent}; }
                        button {
                            background: ${template.colors.accent};
                            color: white;
                            border: none;
                            padding: 10px 20px;
                            border-radius: 5px;
                            cursor: pointer;
                        }
                    </style>
                </head>
                <body>
                    <h1>אחרי העיצוב</h1>
                    <p>עיצוב מותאם אישית עם צבעים ופונטים מהתבנית הנבחרת.</p>
                    <button>כפתור מעוצב</button>
                </body>
                </html>
            `;
            
            document.getElementById('previewModal').style.display = 'block';
        }

        // Close Preview
        function closePreview() {
            document.getElementById('previewModal').style.display = 'none';
            selectedDesign = null;
        }

        // Approve Design
        function approveDesign() {
            if (selectedDesign) {
                alert(`✅ עיצוב "${selectedDesign.name}" אושר!\nנשלח לעיבוד...`);
                closePreview();
            }
        }

        // Scan Site
        async function scanSite() {
            const url = document.getElementById('siteUrl').value;
            if (!url) {
                alert('אנא הכנס כתובת אתר');
                return;
            }

            try {
                // In real implementation, this would call a backend service
                // For now, simulate scanning
                document.getElementById('scanResults').style.display = 'block';
                
                // Simulate extracted data
                const colors = ['#2563eb', '#1e40af', '#f59e0b', '#10b981', '#ffffff'];
                const fonts = ['Roboto', 'Open Sans', 'Montserrat'];
                const images = [
                    'https://via.placeholder.com/150',
                    'https://via.placeholder.com/200',
                    'https://via.placeholder.com/180'
                ];

                // Render colors
                document.getElementById('colorSwatches').innerHTML = colors.map(c => 
                    `<span class="color-swatch" style="background:${c}" title="${c}">${c}</span>`
                ).join('');

                // Render fonts
                document.getElementById('fontsList').innerHTML = fonts.map(f => 
                    `<span class="font-tag">${f}</span>`
                ).join('');

                // Render images
                document.getElementById('imagesList').innerHTML = images.map(img => 
                    `<img src="${img}" class="preview-thumb">`
                ).join('');

                alert(`✓ סריקה הושלמה!\nנמצאו ${colors.length} צבעים, ${fonts.length} פונטים, ${images.length} תמונות`);
            } catch (error) {
                console.error('Scan error:', error);
                alert('שגיאה בסריקת האתר');
            }
        }

        // Process Queue
        async function processQueue() {
            alert('🎨 מתחיל עיבוד תור עיצוב...\nזה ייקח כמה דקות.');
            
            // In real implementation, this would:
            // 1. Get all pending templates from Supabase
            // 2. Apply selected design to each
            // 3. Update status in database
            // 4. Send webhook to n8n
        }

        // Send to n8n
        async function sendToN8N() {
            if (!selectedDesign) {
                alert('אנא בחר עיצוב קודם');
                return;
            }

            try {
                // Send to n8n webhook
                const webhookUrl = 'https://websiseo.app.n8n.cloud/webhook/html-redesign';
                const payload = {
                    design: selectedDesign,
                    timestamp: new Date().toISOString()
                };

                const response = await fetch(webhookUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    alert('✓ נשלח בהצלחה ל-n8n!\nה-workflow יתחיל לרוץ.');
                } else {
                    throw new Error('n8n webhook failed');
                }
            } catch (error) {
                console.error('n8n send error:', error);
                alert('שגיאה בשליחה ל-n8n. בדוק את ה-webhook.');
            }
        }

        // Export All
        function exportAll() {
            alert('📦 מייצא את כל התבניות...\nהקובץ ירד אוטומטית.');
            
            // In real implementation, export to JSON/ZIP
            const data = JSON.stringify(designTemplates, null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'design-templates.json';
            a.click();
        }

        // Helper Functions
        function getCategoryName(category) {
            const names = {
                'minimalist': 'מינימליסטי',
                'colorful': 'צבעוני',
                'business': 'עסקי',
                'dark': 'כהה',
                'organic': 'אורגני'
            };
            return names[category] || category;
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadDesignTemplates();
            
            // Load sample queue data
            const sampleTemplates = [
                { id: 1, name: 'Landing Page - שירותי SEO', design: 'Modern Minimalist', status: 'approved', improvement: '+45%' },
                { id: 2, name: 'דף אודות - MaximoSEO', design: 'Corporate Blue', status: 'in-progress', improvement: '+32%' },
                { id: 3, name: 'בלוג - מאמר SEO', design: 'Vibrant Gradient', status: 'redesigned', improvement: '+58%' },
                { id: 4, name: 'Contact Page', design: 'Dark Mode Elegant', status: 'pending', improvement: '0%' }
            ];

            const tbody = document.getElementById('templates-tbody');
            tbody.innerHTML = sampleTemplates.map(t => `
                <tr>
                    <td>${t.name}</td>
                    <td>${t.design}</td>
                    <td><span class="status-badge status-${t.status}">${t.status}</span></td>
                    <td>${t.improvement}</td>
                    <td>
                        <button onclick="selectDesign(${t.id})" class="btn-small">👁️ תצוגה</button>
                        <button onclick="approveDesign()" class="btn-small">✅ אשר</button>
                    </td>
                </tr>
            `).join('');

            // Update stats
            document.getElementById('total-templates').textContent = sampleTemplates.length;
            document.getElementById('redesigned').textContent = sampleTemplates.filter(t => t.status === 'redesigned').length;
            document.getElementById('in-progress').textContent = sampleTemplates.filter(t => t.status === 'in-progress').length;
            document.getElementById('approved').textContent = sampleTemplates.filter(t => t.status === 'approved').length;
        });
    </script>
</body>
</html>
